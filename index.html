<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EloSavie — Em Breve</title>
  <meta name="description" content="Núcleo de Desenvolvimento Humano. Em breve.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --terra:      #C07B5A;
      --terra-light:#D4957A;
      --sage:       #7BAA8C;
      --sage-light: #A8C5B0;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── VIDEO BG ─── */
    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 25%;
      z-index: 0;
    }

    /* ─── OVERLAY ─── */
    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        160deg,
        rgba(14, 26, 44, 0.80) 0%,
        rgba(14, 26, 44, 0.72) 45%,
        rgba(14, 26, 44, 0.55) 100%
      );
      z-index: 1;
    }

    /* ─── MAIN ─── */
    main {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }

    /* ─── LOGO ─── */
    .logo {
      width: clamp(80px, 14vw, 120px);
      height: auto;
      margin-bottom: 28px;
      animation: fadeDown .9s ease both;
    }

    /* ─── TAG ─── */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(123,170,140,.18);
      border: 1px solid rgba(123,170,140,.32);
      color: var(--sage-light);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .15em;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 50px;
      margin-bottom: 28px;
      animation: fadeDown .9s .1s ease both;
    }
    .tag::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--sage-light);
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ─── HEADLINE ─── */
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 6vw, 72px);
      line-height: 1.12;
      color: #fff;
      max-width: 820px;
      text-shadow: 0 2px 32px rgba(0,0,0,.2);
      margin-bottom: 22px;
      animation: fadeDown .9s .2s ease both;
    }
    h1 em {
      color: var(--terra-light);
      font-style: italic;
    }

    /* ─── SUBTITLE ─── */
    p.sub {
      font-size: clamp(15px, 2vw, 17px);
      color: rgba(255,255,255,.62);
      font-weight: 300;
      line-height: 1.7;
      max-width: 480px;
      margin-bottom: 48px;
      animation: fadeDown .9s .3s ease both;
    }

    /* ─── DIVIDER ─── */
    .divider {
      width: 40px;
      height: 2px;
      background: var(--terra);
      border-radius: 2px;
      margin: 0 auto 48px;
      animation: fadeDown .9s .35s ease both;
    }

    /* ─── CTA ─── */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,.1);
      border: 1.5px solid rgba(255,255,255,.22);
      color: rgba(255,255,255,.9);
      padding: 14px 28px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: .02em;
      backdrop-filter: blur(8px);
      transition: background .25s, border-color .25s, transform .25s;
      animation: fadeDown .9s .4s ease both;
    }
    .cta:hover {
      background: rgba(255,255,255,.17);
      border-color: rgba(255,255,255,.4);
      transform: translateY(-2px);
    }
    .cta svg { flex-shrink: 0; }

    /* ─── FOOTER ─── */
    footer {
      position: fixed;
      bottom: 24px;
      left: 0; right: 0;
      z-index: 3;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 36px;
      pointer-events: none;
    }
    footer span {
      font-size: 11px;
      color: rgba(255,255,255,.28);
      letter-spacing: .04em;
    }
    footer a {
      font-size: 11px;
      color: rgba(255,255,255,.28);
      text-decoration: none;
      pointer-events: all;
      transition: color .2s;
    }
    footer a:hover { color: rgba(255,255,255,.5); }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
